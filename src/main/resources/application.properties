spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/talentcopilot
spring.datasource.username=talentuser
spring.datasource.password=talentpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=local-development-jwt-secret-key-that-is-at-least-32-bytes
app.jwt.expiration-ms=86400000
